<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DinDin</title>
  <link rel="stylesheet" href="./assets/css/main.css" />
  <link rel="stylesheet" href="./assets/css/components.css" />
  <link rel="stylesheet" href="./assets/css/responsive.css" />
</head>
<body>
  <div id="app">
    <header id="app-header" class="header">
      <h1 class="header__title">DinDin</h1>
      <div class="header__actions">
        <div id="drive-sync-area"></div>
        <button id="btn-audit-log" class="btn-icon" title="Histórico de alterações" aria-label="Histórico de alterações">&#128203;</button>
        <button id="btn-settings" class="btn-icon" title="Configurações" aria-label="Configurações">&#9881;</button>
      </div>
    </header>
    <main id="app-main" class="main-content"></main>
  </div>

  <!-- Modals container -->
  <div id="modals"></div>

  <!-- Google APIs: Picker + Identity Services -->
  <script async defer src="https://apis.google.com/js/api.js" onload="window.onGapiLoad && window.onGapiLoad()"></script>
  <script async defer src="https://accounts.google.com/gsi/client" onload="window.onGisLoad && window.onGisLoad()"></script>

  <!-- JS modules -->
  <script type="module" src="./assets/js/app.js"></script>
</body>
</html>
